services:
  flask:
    build: .
    container_name: flash_app
    networks:
      - app_network
    restart: on-failure
    depends_on: 
      - redis
      - db
    deploy:
      resources:
        limits:
          memory: 100M 
    volumes:
      - ./app:/home/myuser/app


  db:
    image: postgres:latest
    container_name: app_db
    env_file: 
      - .env
    restart: always
    networks: 
      - app_network
    volumes:
      - app_volumes:/var/lib/postgresql
  
    
  redis:
    image: redis:alpine
    container_name: app_redis
    networks:
      - app_network
   
  nginx:
    image: nginx:alpine
    container_name: app_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8660:80"
    networks:
      - app_network
    depends_on:
      - flask 
   
  grafana:
    image: grafana/grafana:latest
    container_name: app_grafana
    ports:
      - "3050:3000" 
    networks:
      - app_network

   
networks: 
  app_network:
volumes: 
  app_volumes: 
